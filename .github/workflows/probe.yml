name: cf-probe
"on":
  workflow_dispatch:
jobs:
    probe:
      runs-on: ubuntu-latest
      steps:
        - name: probe
          run: |
            echo "===== egress IP ====="
            curl -sS https://ipinfo.io/json || true
            echo
            echo "===== discovery ====="
            curl -sS -i https://learn.launchfire.com/.well-known/oauth-authorization-server | head -40 || true
            echo
            echo "===== token POST ====="
            curl -sS -i -X POST https://learn.launchfire.com/oauth/token | head -40 || true
            echo
            echo "===== MCP protected-resource ====="
            curl -sS -i "https://mcp.lemonadelxp.com/.well-known/oauth-protected-resource/t/fk39fhfd/mcp" | head -30 || true
